name: Test and Build Spring Boot

on:
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 # Hoặc phiên bản Java bạn đang dùng (21, 11...)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Tự động lưu cache thư viện Java

      - name: Build with Maven
        # Lệnh này vừa chạy Unit Test, vừa đóng gói thử thành file .jar
        run: mvn clean package