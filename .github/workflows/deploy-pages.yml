name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - Hoang
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Kéo toàn bộ code của Repo về máy ảo
      - name: Checkout
        uses: actions/checkout@v4

      # Bước 2: Cài đặt môi trường Flutter SDK
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Bước 3: Cài đặt thư viện (Chạy trực tiếp bên trong thư mục frontend)
      - name: Install dependencies
        working-directory: ./frontend
        run: flutter pub get

      # Bước 4: Biên dịch ra bản Web (Chạy trực tiếp bên trong thư mục frontend)
      - name: Build web
        working-directory: ./frontend
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      # Bước 5: Đóng gói và đẩy thư mục web đã build lên bộ nhớ tạm của GitHub
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ĐƯỜNG DẪN CHÍNH XÁC: Phải trỏ thẳng vào thư mục build nằm trong frontend
          path: ./frontend/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Bước 6: Lấy gói sản phẩm ở Bước 5 và xuất bản lên internet
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4