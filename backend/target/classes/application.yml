server:
  port: 8081

spring:
  application:
    name: hango-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/hango_db2?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: "${DB_PASSWORD:123456}"
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  # Cấu hình bảo mật OAuth2 cho Google Login          
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "628349174226-v41jse8svi532nh3undf32fepqbv8deu.apps.googleusercontent.com"          

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  mail:
    from: ${MAIL_FROM:no-reply@hango.local}
  otp:
    ttl-minutes: ${OTP_TTL_MINUTES:10}

